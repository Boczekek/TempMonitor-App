<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monitor Systemu SQL</title>
  <style>
    body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; text-align: center; }
    .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
    h1 { color: #2c3e50; }
    .status { margin-bottom: 20px; color: #7f8c8d; font-size: 0.9em; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th { background-color: #3498db; color: white; padding: 12px; }
    td { padding: 10px; border-bottom: 1px solid #ddd; text-align: center; }
    tr:hover { background-color: #f1f1f1; }
    .temp-value { font-weight: bold; color: #e67e22; }
  </style>
</head>
<body>

<div class="container">
  <h1>Monitor Temperatury</h1>
  <p class="status" id="refresh-status">Ładowanie danych...</p>

  <table>
    <thead>
    <tr>
      <th>Data</th>
      <th>Godzina</th>
      <th>Temperatura</th>
    </tr>
    </thead>
    <tbody id="data-table">
    <!-- Tutaj JavaScript wstawi dane -->
    </tbody>
  </table>
</div>

<script>
  async function fetchPomiary() {
      try {
          // Pobieranie danych z Twojego API
          const response = await fetch('/api/pomiary');
          const dane = await response.json();

          const tableBody = document.getElementById('data-table');
          tableBody.innerHTML = ''; // Czyścimy tabelę przed nowymi danymi

          // Sortujemy, aby najnowsze były na górze
          dane.reverse().forEach(pomiar => {
              const row = `
                  <tr>
                      <td>${pomiar.data}</td>
                      <td>${pomiar.godzina}</td>
                      <td class="temp-value">${pomiar.temperatura} °C</td>
                  </tr>
              `;
              tableBody.innerHTML += row;
          });

          document.getElementById('refresh-status').innerText =
              "Ostatnia aktualizacja: " + new Date().toLocaleTimeString();

      } catch (error) {
          console.error("Błąd podczas pobierania danych:", error);
          document.getElementById('refresh-status').innerText = "Błąd połączenia z serwerem!";
      }
  }

  // Wywołaj funkcję od razu
  fetchPomiary();

  // Odświeżaj dane co 60 sekund (zgodnie z wysyłką z Arduino)
  setInterval(fetchPomiary, 60000);
</script>

</body>
</html>
